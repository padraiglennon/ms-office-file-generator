repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^src/common_file_generator/web/static/htmx\.min\.js$
      - id: end-of-file-fixer
        exclude: ^src/common_file_generator/web/static/htmx\.min\.js$
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      # Warn-only UI screenshot-drift guard (ADR-015). Fires only when a commit
      # stages UI-affecting files; re-captures headless and pixel-diffs against
      # the committed PNGs. Always exits 0 (never blocks); skips cleanly when
      # Chromium/the shots+web extras aren't installed.
      - id: screenshot-drift
        name: screenshot-drift (warn-only)
        entry: uv run python scripts/check_screenshot_drift.py
        language: system
        pass_filenames: false
        files: >-
          (?x)^(
            src/common_file_generator/web/.*|
            scripts/capture_screenshots\.py|
            docs/assets/screenshots/.*\.png
          )$
